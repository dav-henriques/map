<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <!-- Viewport mobile-first: impede zoom manual e ocupa tela cheia -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0f1e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>PokéMap</title>

  <!-- Leaflet.js — biblioteca de mapas open source -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Google Fonts: Rajdhani (display) + Share Tech Mono (hud) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       OVERLAY DE LOADING / PERMISSÃO DE GPS
  ═══════════════════════════════════════════ -->
  <div id="loading-screen">
    <div class="loading-inner">
      <!-- Logo animado -->
      <div class="logo-wrap">
        <div class="pokeball">
          <div class="pokeball-top"></div>
          <div class="pokeball-mid">
            <div class="pokeball-btn"></div>
          </div>
          <div class="pokeball-bottom"></div>
        </div>
      </div>
      <h1 class="game-title">PokéMap</h1>
      <p class="loading-msg" id="loading-msg">Buscando sinal GPS...</p>
      <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       ERRO: localização negada
  ═══════════════════════════════════════════ -->
  <div id="error-screen" class="hidden">
    <div class="error-inner">
      <div class="error-icon">⚠️</div>
      <h2>Localização Bloqueada</h2>
      <p>O PokéMap precisa de acesso ao GPS para funcionar.<br>Ative a permissão nas configurações do navegador e recarregue a página.</p>
      <button onclick="location.reload()" class="btn-retry">Tentar Novamente</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       MAPA PRINCIPAL (container Leaflet)
  ═══════════════════════════════════════════ -->
  <div id="map"></div>

  <!-- ═══════════════════════════════════════════
       HUD SUPERIOR — nome do jogo + coordenadas
  ═══════════════════════════════════════════ -->
  <div id="hud-top">
    <div class="hud-brand">
      <span class="hud-dot"></span>
      PokéMap
    </div>
    <div class="hud-coords" id="hud-coords">--°N  --°W</div>
  </div>

  <div id="hud-bottom">
    <button class="hud-btn" id="btn-center" title="Centralizar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        <circle cx="12" cy="12" r="8" stroke-dasharray="3 3" opacity=".4"/>
      </svg>
    </button>

    <!-- Indicador de precisão do GPS -->
    <div class="hud-status" id="hud-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">aguardando...</span>
    </div>

    <!-- Botão de zoom in -->
    <button class="hud-btn" id="btn-zoom-in" title="Zoom +">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="11" y1="8" x2="11" y2="14"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </button>
  </div>

  <!-- ═══════════════════════════════════════════
       TOAST — notificações rápidas (ex: spawn)
  ═══════════════════════════════════════════ -->
  <div id="toast" class="hidden"></div>

  <script src="script.js"></script>
</body>
</html>
