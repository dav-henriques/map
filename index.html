<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0c0c0c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Trace</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Loading -->
  <div id="loading-screen">
    <div class="loading-inner">
      <div class="app-icon">
        <div class="app-icon-ring"></div>
        <div class="app-icon-ring"></div>
        <div class="app-icon-ring"></div>
        <div class="app-icon-dot"></div>
      </div>
      <h1 class="app-title">Trace</h1>
      <p class="loading-msg" id="loading-msg">iniciando</p>
      <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
    </div>
  </div>

  <!-- Erro -->
  <div id="error-screen" class="hidden">
    <div class="error-inner">
      <div class="error-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M12 8v5M12 16.5v.5"/>
        </svg>
      </div>
      <h2>Sem acesso à localização</h2>
      <p>Ative a permissão de GPS nas configurações do navegador e tente novamente.</p>
      <button onclick="location.reload()" class="btn-retry">Tentar novamente</button>
    </div>
  </div>

  <!-- Mapa -->
  <div id="map"></div>

  <!-- HUD topo -->
  <div id="hud-top">
    <div class="hud-brand">Trace</div>
    <div class="hud-coords" id="hud-coords">— —</div>
  </div>

  <!-- HUD base -->
  <div id="hud-bottom">
    <button class="hud-btn" id="btn-center" title="Centralizar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
      </svg>
    </button>

    <div class="hud-status" id="hud-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">aguardando</span>
    </div>

    <button class="hud-btn" id="btn-zoom-in" title="Zoom +">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/>
        <path d="M21 21l-3.5-3.5M11 8v6M8 11h6"/>
      </svg>
    </button>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden"></div>

  <script src="script.js"></script>
</body>
</html>
